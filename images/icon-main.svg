  <rect x="16" y="69" width="18" height="2" rx="1" fill="#1a1a2e" opacity="0.3"/>
  <rect x="16" y="75" width="20" height="2" rx="1" fill="#1a1a2e" opacity="0.3"/>
  <!-- Book lines (right) -->
  <rect x="58" y="63" width="22" height="2" rx="1" fill="#1a1a2e" opacity="0.3"/>
  <rect x="58" y="69" width="18" height="2" rx="1" fill="#1a1a2e" opacity="0.3"/>
  <rect x="58" y="75" width="20" height="2" rx="1" fill="#1a1a2e" opacity="0.3"/>
