<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>故 박수삼 메모리얼</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Serif KR',Georgia,serif;background:#f5f0e8;color:#2c2c2c;max-width:480px;margin:0 auto}</style></head><body><div style="background:#1a1a2e;padding:32px 20px;text-align:center"><div style="font-size:9px;letter-spacing:5px;color:rgba(200,169,110,0.45);margin-bottom:16px">MEMORIAL PAGE</div><div style="display:flex;justify-content:center;margin-bottom:16px"><img src="https://storage.tally.so/private/17768454258817394555477913012767.jpg?id=LozrNy&accessToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IkxvenJOeSIsImZvcm1JZCI6IjdSVkFaYSIsImlhdCI6MTc3Njg0NTQ0M30.gnM5tcYLv098ydK1cQt_qqY3ZWcN6iZfojCMkpdcjAo&signature=9cbac1d01a4b9f96829c5f30e99ef539ecdc46eb208b9c2cee544b7f59e0d337" style="width:120px;height:150px;object-fit:cover;object-position:top;border-radius:2px;border:1.5px solid #c8a96e;display:block;"></div><div style="font-size:24px;font-weight:300;color:#f5f0e8;letter-spacing:4px;margin-bottom:6px">故 박수삼</div><div style="font-size:11px;color:rgba(200,169,110,0.5);letter-spacing:1px">1982년 4월 22일 — 2026년 4월 20일</div><div style="font-size:13px;font-style:italic;color:rgba(200,169,110,0.7);margin-top:12px;line-height:1.7">웃음 뒤에 깊은 믿음을 품은 분</div></div><div style="background:#fff;padding:24px 20px;margin-top:1px"><div style="font-size:10px;letter-spacing:4px;color:#8b7355;margin-bottom:14px">고 인 소 개</div><div style="font-size:14px;line-height:2.1;color:#3a3a3a">한평생 하나님과 함께 하신 분</div></div><div style="background:#f9f5ef;border:0.5px solid #d4c9b5;padding:20px;margin-top:1px"><div style="font-size:10px;letter-spacing:4px;color:#8b7355;margin-bottom:16px">생 애 타 임 라 인</div><div style="display:flex;gap:14px;margin-bottom:14px;align-items:flex-start"><div style="min-width:48px;font-size:11px;color:#8b7355;padding-top:3px;letter-spacing:0.5px"></div><div style="width:1px;background:#d4c9b5;flex-shrink:0;margin-top:6px"></div><div style="flex:1;font-size:13px;color:#2c2c2c;line-height:1.8">곤</div></div></div><div style="background:#fff;padding:20px;margin-top:1px"><div style="font-size:10px;letter-spacing:4px;color:#8b7355;margin-bottom:16px">생 애 사 진</div><div style="margin-bottom:20px"><img src="https://storage.tally.so/private/17768453289781115075757390767523.jpg?id=kr9okj&accessToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6ImtyOW9raiIsImZvcm1JZCI6IjdSVkFaYSIsImlhdCI6MTc3Njg0NTQ0M30.OS9xitBvXwu9mjqzrHwoN1_dYypkWMV0UPX99Ij1bpU&signature=67e4b1d0563421364e1ade339c132698d6ef69c91d6a3e859b162eff3fdd4c22" style="width:100%;border-radius:4px;display:block;"><div style="font-size:12px;color:#8b7355;margin-top:6px;line-height:1.7;padding:0 4px">감사합니다 ㅎㅎ 오늘 금요찬송단</div></div><div style="margin-bottom:20px"><img src="https://storage.tally.so/private/1776845348915888165146014491426.jpg?id=5O47Vv&accessToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjVPNDdWdiIsImZvcm1JZCI6IjdSVkFaYSIsImlhdCI6MTc3Njg0NTQ0M30.qwfDZZJT8BWS9O5GBthuLH45VaEVfSQKI5xyFPZoxs8&signature=be76d65fda81eb3d8ce331390529041e1459987b6356c430fbe625072689397c" style="width:100%;border-radius:4px;display:block;"><div style="font-size:12px;color:#8b7355;margin-top:6px;line-height:1.7;padding:0 4px">넵 알겠습니다 감사합니다 선생님</div></div><div style="margin-bottom:20px"><img src="https://storage.tally.so/private/17768453578958865798310396800556.jpg?id=6VelPo&accessToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZWZWxQbyIsImZvcm1JZCI6IjdSVkFaYSIsImlhdCI6MTc3Njg0NTQ0M30.bI1MW1ntnjhzweRVk1TijXSsrgX6SrQOGP_d1Y_6j0I&signature=b21d775496b9cb384bc6ae00f661d1e14dcca4b3902a9ac47fda0962d2ef3e84" style="width:100%;border-radius:4px;display:block;"><div style="font-size:12px;color:#8b7355;margin-top:6px;line-height:1.7;padding:0 4px">넵 감사합니다 선생님 안녕하세요</div></div><div style="margin-bottom:20px"><img src="https://storage.tally.so/private/17768453678035526664324399766782.jpg?id=rqB4qp&accessToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6InJxQjRxcCIsImZvcm1JZCI6IjdSVkFaYSIsImlhdCI6MTc3Njg0NTQ0M30.WCOeCiNOVX0RpeNVtNpyDI1c7WzpO8HVFH9mrhiwUgw&signature=b9d2d5f7eff928bc8bf1bd0961416c3954d75743b1e27916b0f8132ef8f89020" style="width:100%;border-radius:4px;display:block;"><div style="font-size:12px;color:#8b7355;margin-top:6px;line-height:1.7;padding:0 4px">배우자 이제 곧 받으리라</div></div><div style="margin-bottom:20px"><img src="https://storage.tally.so/private/17768453777464926897579588541919.jpg?id=pZdE5P&accessToken=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6InBaZEU1UCIsImZvcm1JZCI6IjdSVkFaYSIsImlhdCI6MTc3Njg0NTQ0M30.rrYu6jllzYC3bDg4r5hz77r0KvDCJtQ4UepRKFMe-mU&signature=7feaa569cb1ea517f3c07fe0b96e195831a901faf09e1d7999daa61bd7993b14" style="width:100%;border-radius:4px;display:block;"><div style="font-size:12px;color:#8b7355;margin-top:6px;line-height:1.7;padding:0 4px">송금했습니다 나 지금 막</div></div></div><div style="background:#fff;padding:24px 20px;margin-top:1px"><div style="font-size:10px;letter-spacing:4px;color:#8b7355;margin-bottom:20px">디 지 털 방 명 록</div><div style="background:#f9f5ef;border:0.5px solid #d4c9b5;border-radius:4px;padding:16px;margin-bottom:20px"><div style="font-size:11px;color:#8b7355;margin-bottom:10px;letter-spacing:1px">추모 글 남기기</div><input id="gb-author" placeholder="이름" maxlength="20" style="width:100%;padding:9px 12px;border:0.5px solid #d4c9b5;border-radius:3px;font-size:13px;font-family:inherit;background:#fff;color:#2c2c2c;margin-bottom:8px;outline:none;display:block"><textarea id="gb-message" placeholder="故 박수삼 님을 추모하며..." maxlength="500" rows="4" style="width:100%;padding:9px 12px;border:0.5px solid #d4c9b5;border-radius:3px;font-size:13px;font-family:inherit;background:#fff;color:#2c2c2c;margin-bottom:8px;outline:none;resize:vertical;line-height:1.7;display:block"></textarea><div style="display:flex;gap:8px"><input id="gb-pw" placeholder="비밀번호 (삭제 시 필요)" type="password" maxlength="20" style="flex:1;padding:9px 12px;border:0.5px solid #d4c9b5;border-radius:3px;font-size:13px;font-family:inherit;background:#fff;color:#2c2c2c;outline:none;min-width:0"><button id="gb-submit" onclick="gbSubmit()" style="padding:9px 18px;background:#1a1a2e;color:#c8a96e;border:none;border-radius:3px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0">남기기</button></div><div id="gb-form-msg" style="font-size:12px;margin-top:8px;display:none"></div></div><div id="gb-list"><div style="text-align:center;padding:24px;color:#b0a090;font-size:13px">불러오는 중...</div></div></div><div id="gb-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;padding:20px"><div style="background:#fff;padding:24px;border-radius:6px;width:100%;max-width:320px"><div style="font-size:14px;color:#2c2c2c;margin-bottom:6px">글 삭제</div><div style="font-size:12px;color:#8b7355;margin-bottom:14px">작성 시 입력한 비밀번호를 입력해 주세요</div><input id="modal-pw" type="password" placeholder="비밀번호" maxlength="20" style="width:100%;padding:10px 12px;border:0.5px solid #d4c9b5;border-radius:3px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;display:block"><div id="modal-err" style="font-size:12px;color:#c0392b;margin-bottom:10px;display:none"></div><div style="display:flex;gap:8px;justify-content:flex-end"><button onclick="gbModalClose()" style="padding:8px 16px;background:#f5f0e8;border:0.5px solid #d4c9b5;border-radius:3px;font-size:13px;font-family:inherit;cursor:pointer;color:#2c2c2c">취소</button><button onclick="gbDeleteConfirm()" style="padding:8px 16px;background:#1a1a2e;border:none;border-radius:3px;font-size:13px;font-family:inherit;cursor:pointer;color:#c8a96e">삭제</button></div></div></div><script>
const GB_NAME="\ubc15\uc218\uc0bc";
const GB_API="https://humandocu-server-production.up.railway.app";
let _delId=null;
function escHtml(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function fmtDate(s){
  if(!s)return"";
  var d=new Date(s);
  return d.getFullYear()+"."+(d.getMonth()+1).toString().padStart(2,"0")+"."+d.getDate().toString().padStart(2,"0");
}
function gbRender(entries){
  var el=document.getElementById("gb-list");
  if(!entries||!entries.length){
    el.innerHTML='<div style="text-align:center;padding:28px 0;color:#b0a090;font-size:13px;line-height:2">아직 방명록이 없습니다.<br>첫 번째 추모 글을 남겨 주세요.</div>';
    return;
  }
  el.innerHTML=entries.map(function(e){
    return '<div style="border-bottom:0.5px solid #e8e2d8;padding:16px 0">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
      +'<div style="font-size:13px;font-weight:500;color:#2c2c2c">'+escHtml(e.author)+'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">'
      +'<span style="font-size:11px;color:#b0a090">'+fmtDate(e.created_at)+'</span>'
      +'<button data-del-id="'+e.id+'" style="font-size:11px;color:#b0a090;background:none;border:0.5px solid #d4c9b5;border-radius:2px;padding:2px 8px;cursor:pointer;font-family:inherit">삭제</button>'
      +'</div></div>'
      +'<div style="font-size:13px;color:#3a3a3a;line-height:1.9;white-space:pre-wrap">'+escHtml(e.message)+'</div>'
      +'</div>';
  }).join("");
}
function gbLoad(){
  fetch(GB_API+"/api/guestbook?name="+encodeURIComponent(GB_NAME))
  .then(function(r){return r.json();})
  .then(function(d){gbRender(d.entries||[]);})
  .catch(function(){
    document.getElementById("gb-list").innerHTML='<div style="text-align:center;padding:20px;color:#b0a090;font-size:13px">불러오기 실패</div>';
  });
}
function gbSubmit(){
  var author=document.getElementById("gb-author").value.trim();
  var msg=document.getElementById("gb-message").value.trim();
  var pw=document.getElementById("gb-pw").value.trim();
  var info=document.getElementById("gb-form-msg");
  info.style.display="none";
  if(!author){info.textContent="이름을 입력해 주세요";info.style.color="#c0392b";info.style.display="block";return;}
  if(!msg){info.textContent="내용을 입력해 주세요";info.style.color="#c0392b";info.style.display="block";return;}
  if(!pw){info.textContent="비밀번호를 입력해 주세요";info.style.color="#c0392b";info.style.display="block";return;}
  var btn=document.getElementById("gb-submit");
  btn.disabled=true;btn.textContent="저장 중...";
  fetch(GB_API+"/api/guestbook",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:GB_NAME,author:author,message:msg,password:pw})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.status==="ok"){
      document.getElementById("gb-author").value="";
      document.getElementById("gb-message").value="";
      document.getElementById("gb-pw").value="";
      info.textContent="방명록이 등록되었습니다.";info.style.color="#7a9e7e";info.style.display="block";
      gbLoad();
    }else{
      info.textContent=d.error||"저장 실패";info.style.color="#c0392b";info.style.display="block";
    }
    btn.disabled=false;btn.textContent="남기기";
  })
  .catch(function(){
    info.textContent="네트워크 오류. 다시 시도해 주세요.";info.style.color="#c0392b";info.style.display="block";
    btn.disabled=false;btn.textContent="남기기";
  });
}
function gbDeleteOpen(id){
  _delId=id;
  document.getElementById("modal-pw").value="";
  document.getElementById("modal-err").style.display="none";
  document.getElementById("gb-modal").style.display="flex";
}
function gbModalClose(){
  _delId=null;
  document.getElementById("gb-modal").style.display="none";
}
function gbDeleteConfirm(){
  var pw=document.getElementById("modal-pw").value.trim();
  var errEl=document.getElementById("modal-err");
  if(!pw){errEl.textContent="비밀번호를 입력해 주세요";errEl.style.display="block";return;}
  fetch(GB_API+"/api/guestbook/"+_delId,{
    method:"DELETE",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:GB_NAME,password:pw})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.status==="ok"){gbModalClose();gbLoad();}
    else{errEl.textContent=d.error||"삭제 실패";errEl.style.display="block";}
  })
  .catch(function(){errEl.textContent="네트워크 오류";errEl.style.display="block";});
}
document.addEventListener("DOMContentLoaded",function(){
  gbLoad();
  document.getElementById("gb-list").addEventListener("click",function(ev){
    var btn=ev.target.closest("[data-del-id]");
    if(btn)gbDeleteOpen(btn.getAttribute("data-del-id"));
  });
});
</script><div style="background:#1a1a2e;padding:16px;text-align:center;font-size:11px;color:#5a5a7a;margin-top:1px"><a href="https://humandocu.com" style="color:#8888aa;text-decoration:none">휴먼다큐닷컴</a> · 2026.04.22</div></body></html>
