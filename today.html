<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>투*필 피드 · 휴먼다큐</title>
<link rel="manifest" href="/today-manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="투*필">
<link rel="apple-touch-icon" href="/today-icon-192.png">
<meta name="robots" content="noindex">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0f0e0c;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif}

/* ── 상단 네비 ── */
#top-bar{position:sticky;top:0;z-index:100;background:#0f0e0c;border-bottom:1px solid rgba(255,255,255,.07);
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
#lang-row{display:flex;gap:4px}
.lang-btn{display:inline-flex;align-items:center;gap:3px;background:transparent;
  border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.75);
  font-size:18px;font-family:inherit;border-radius:8px;padding:3px 6px;
  cursor:pointer;transition:all .15s;line-height:1;text-decoration:none}
.lang-btn.active{background:#C8870A;border-color:#C8870A}
.lang-btn:active{opacity:.7}
#make-btn{display:inline-flex;align-items:center;gap:6px;background:#C8870A;color:#fff;
  text-decoration:none;border-radius:10px;padding:8px 14px;
  font-size:13px;font-weight:600;white-space:nowrap;transition:opacity .15s}
#make-btn:active{opacity:.7}

/* ── 헤더 ── */
#feed-header{padding:20px 16px 12px;text-align:center}
#feed-title{font-size:13px;letter-spacing:.2em;color:rgba(255,255,255,.35);font-weight:400}

/* ── 피드 그리드 ── */
#feed-wrap{padding:0 12px 80px}
#feed-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}

/* ── 피드 카드 ── */
.feed-card{text-decoration:none;background:#1a1712;border-radius:10px;overflow:hidden;
  border:1px solid rgba(255,255,255,.06);display:block;transition:opacity .15s}
.feed-card:active{opacity:.7}
.feed-card-imgs{display:flex}
.feed-card-imgs img{width:50%;aspect-ratio:1;object-fit:cover;display:block;flex-shrink:0}
.feed-card-imgs .img-placeholder{width:50%;aspect-ratio:1;background:#2a2520;flex-shrink:0}
.feed-card-info{padding:7px 9px 9px}
.feed-card-name{font-size:12px;font-weight:600;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-card-identity{font-size:11px;color:rgba(200,169,110,.7);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── 상태 메시지 ── */
.feed-msg{text-align:center;padding:48px 0;font-size:13px;color:rgba(255,255,255,.3)}

/* ── 더보기 버튼 ── */
#more-btn{display:block;width:calc(100% - 24px);margin:0 12px 16px;
  padding:13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:10px;color:rgba(255,255,255,.6);font-size:13px;font-family:inherit;
  cursor:pointer;transition:opacity .15s}
#more-btn:active{opacity:.7}
</style>
</head>
<body>

<div id="top-bar">
  <div id="lang-row">
    <a href="/today-form.html" class="lang-btn" id="lb-ko" title="한국어">🇰🇷</a>
    <a href="/today-form-en.html" class="lang-btn" id="lb-en" title="English">🇺🇸</a>
    <a href="/today-form-jp.html" class="lang-btn" id="lb-jp" title="日本語">🇯🇵</a>
    <a href="/today-form-zh.html" class="lang-btn" id="lb-zh" title="中文">🇨🇳</a>
  </div>
  <a href="/today-form.html" id="make-btn" data-ko="나의 투*필 만들기 →" data-en="Create My Tu·Fil →" data-jp="투*필을 만들기 →" data-zh="创建我的 투*필 →">나의 투*필 만들기 →</a>
</div>

<div id="feed-header">
  <div id="feed-title">TODAY FILMOGRAPHY</div>
</div>

<div id="feed-wrap">
  <div id="feed-grid">
    <div class="feed-msg" id="feed-loading" style="grid-column:1/-1">불러오는 중...</div>
  </div>
</div>
<button id="more-btn" style="display:none">더 보기</button>

<script>
var SERVER = 'https://humandocu-server-production.up.railway.app';
var FEED_API = SERVER + '/api/today/feed';
var offset = 0, limit = 20, loading = false, noMore = false;

// 언어 설정
var lang = 'KO';
try { lang = localStorage.getItem('lang') || 'KO'; } catch(e){}
document.getElementById('lb-' + lang.toLowerCase()).classList.add('active');
var makeBtn = document.getElementById('make-btn');
var langMap = {KO:'/today-form.html', EN:'/today-form-en.html', JP:'/today-form-jp.html', ZH:'/today-form-zh.html'};
makeBtn.href = langMap[lang] || '/today-form.html';
var makeLabel = makeBtn.getAttribute('data-' + lang.toLowerCase());
if (makeLabel) makeBtn.textContent = makeLabel;

function makeCard(item) {
  var p1 = item.photo1
    ? '<img src="' + item.photo1 + '" loading="lazy">'
    : '<div class="img-placeholder"></div>';
  var p2 = item.photo2
    ? '<img src="' + item.photo2 + '" loading="lazy">'
    : '<div class="img-placeholder"></div>';
  var name = item.nickname || item.name || '익명';
  var identity = item.identity || item.today_sentence || '';
  return '<a href="' + SERVER + '/today/' + item.doc_id + '" class="feed-card">'
    + '<div class="feed-card-imgs">' + p1 + p2 + '</div>'
    + '<div class="feed-card-info">'
    + '<div class="feed-card-name">' + name + '</div>'
    + (identity ? '<div class="feed-card-identity">' + identity + '</div>' : '')
    + '</div></a>';
}

async function loadFeed(reset) {
  if (loading || noMore) return;
  loading = true;
  if (reset) {
    offset = 0; noMore = false;
    document.getElementById('feed-grid').innerHTML = '<div class="feed-msg" style="grid-column:1/-1">불러오는 중...</div>';
    document.getElementById('more-btn').style.display = 'none';
  }
  try {
    var res = await fetch(FEED_API + '?limit=' + limit + '&offset=' + offset);
    var data = await res.json();
    var grid = document.getElementById('feed-grid');
    if (offset === 0) grid.innerHTML = '';
    if (!data.items || data.items.length === 0) {
      if (offset === 0) grid.innerHTML = '<div class="feed-msg" style="grid-column:1/-1">아직 기록이 없어요</div>';
      noMore = true;
      document.getElementById('more-btn').style.display = 'none';
    } else {
      grid.insertAdjacentHTML('beforeend', data.items.map(makeCard).join(''));
      offset += data.items.length;
      var btn = document.getElementById('more-btn');
      btn.style.display = data.has_more ? 'block' : 'none';
    }
  } catch(e) {
    document.getElementById('feed-grid').innerHTML = '<div class="feed-msg" style="grid-column:1/-1">잠시 후 다시 시도해주세요</div>';
  }
  loading = false;
}

document.getElementById('more-btn').onclick = function(){ loadFeed(false); };
loadFeed(true);
</script>
</body>
</html>
