<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일 청첩장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:#fff;color:#333;}

/* 상단 초대 텍스트 */
.invite-top{padding:28px 20px 16px;text-align:center;}
.invite-badge{font-size:9px;letter-spacing:.22em;color:#c8a96e;margin-bottom:10px;}
.invite-names{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:300;color:#1a1410;margin-bottom:6px;}
.invite-date{font-size:12px;color:#888;}
.invite-text{font-family:'Noto Serif KR',serif;font-size:13px;font-weight:300;color:#555;line-height:2.1;margin-top:12px;}

/* 사진 그리드 - 밝고 화사한 웨딩 사진들 */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin:14px 0;}
.photo-main{grid-column:1/-1;height:180px;overflow:hidden;}
.photo-main img{width:100%;height:100%;object-fit:cover;object-position:center 30%;}
.photo-sub{height:110px;overflow:hidden;}
.photo-sub img{width:100%;height:100%;object-fit:cover;}

/* 일정 */
.info-box{background:#faf8f4;margin:0 14px 14px;border-radius:10px;padding:16px;}
.info-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
.info-row:last-child{margin-bottom:0;}
.info-icon{font-size:15px;width:22px;flex-shrink:0;margin-top:1px;}
.info-text{font-size:12px;color:#555;line-height:1.7;}
.info-text strong{display:block;font-size:13px;color:#222;}

/* 지도 */
.map-area{margin:0 14px 14px;height:100px;background:#e8e8e8;border-radius:8px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.map-area::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,#ddd,#ddd 2px,#e8e8e8 2px,#e8e8e8 12px);opacity:.4;}
.map-pin{font-size:24px;position:relative;}

/* 버튼 */
.btn-group{display:flex;gap:8px;padding:0 14px 16px;}
.btn{flex:1;padding:11px;border-radius:7px;font-size:11px;text-align:center;font-family:'Noto Sans KR',sans-serif;font-weight:500;border:none;cursor:pointer;}
.btn-k{background:#FEE500;color:#3A1D1D;}
.btn-n{background:#03C75A;color:#fff;}

/* 하단 */
.rsvp{padding:16px 20px;text-align:center;border-top:1px solid #f0f0f0;}
.rsvp-title{font-family:'Noto Serif KR',serif;font-size:14px;color:#333;margin-bottom:4px;}
.rsvp-sub{font-size:11px;color:#aaa;margin-bottom:12px;}
.rsvp-btn{display:inline-block;padding:10px 24px;background:#1a1410;color:#fff;border-radius:6px;font-size:11px;}
footer{padding:12px;text-align:center;font-size:9px;color:#ccc;background:#faf8f4;}
</style>
</head>
<body>

<div class="invite-top">
  <div class="invite-badge">WEDDING INVITATION</div>
  <div class="invite-names">홍길동 ♥ 김영희</div>
  <div class="invite-date">2025년 6월 14일 토요일 오후 2시</div>
  <div class="invite-text">저희 두 사람이<br>평생을 함께 걷고자 합니다</div>
</div>

<div class="photo-grid">
  <div class="photo-main">
    <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=600&q=85&auto=format&fit=crop&crop=top" alt="">
  </div>
  <div class="photo-sub">
    <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=300&q=80&auto=format&fit=crop" alt="">
  </div>
  <div class="photo-sub">
    <img src="https://images.unsplash.com/photo-1606216794074-735e91aa2c92?w=300&q=80&auto=format&fit=crop&crop=faces" alt="">
  </div>
</div>

<div class="info-box">
  <div class="info-row"><span class="info-icon">📅</span><div class="info-text"><strong>2025년 6월 14일 토요일</strong>오후 2시 본식</div></div>
  <div class="info-row"><span class="info-icon">📍</span><div class="info-text"><strong>그랜드볼룸 웨딩홀 3층</strong>서울 강남구 테헤란로 123</div></div>
  <div class="info-row"><span class="info-icon">🚗</span><div class="info-text">지하 2~3층 주차 (2시간 무료)</div></div>
</div>

<div class="map-area"><span class="map-pin">📍</span></div>
<div class="btn-group">
  <button class="btn btn-k">💬 카카오로 공유</button>
  <button class="btn btn-n">🗺 길 찾기</button>
</div>

<div class="rsvp">
  <div class="rsvp-title">참석 여부를 알려주세요</div>
  <div class="rsvp-sub">6월 7일까지 회신 부탁드립니다</div>
  <div class="rsvp-btn">참석 의사 전달하기</div>
</div>
<footer>모바일 청첩장 샘플</footer>
</body>
</html>
