<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일 청첩장 샘플</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:#fff;color:#333;}

/* 히어로 */
.hero{
  width:100%;height:55vw;max-height:260px;
  position:relative;overflow:hidden;
  background:#1a1410;
}
.hero img{width:100%;height:100%;object-fit:cover;opacity:.6;}
.hero-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;text-align:center;padding:20px;
}
.hero-badge{font-size:9px;letter-spacing:.25em;color:rgba(255,255,255,.6);margin-bottom:10px;}
.hero-names{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:300;margin-bottom:6px;}
.hero-date{font-size:12px;color:rgba(255,255,255,.7);}

/* 본문 */
.section{padding:28px 24px;border-bottom:1px solid #f0f0f0;text-align:center;}
.section-title{font-size:11px;letter-spacing:.15em;color:#c8a96e;margin-bottom:16px;}
.invite-text{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:300;line-height:2.1;color:#333;}

/* 일정 */
.schedule{background:#faf8f4;border-radius:12px;padding:20px;margin:0 20px 20px;}
.sch-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.sch-row:last-child{margin-bottom:0;}
.sch-icon{font-size:18px;width:32px;text-align:center;}
.sch-text{font-size:13px;color:#555;line-height:1.6;}
.sch-text strong{display:block;color:#222;font-size:14px;}

/* 지도 */
.map-mock{
  background:#e8e8e8;height:140px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#888;
  position:relative;overflow:hidden;
}
.map-mock::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,#ddd 25%,#e8e8e8 25%,#e8e8e8 50%,#ddd 50%,#ddd 75%,#e8e8e8 75%);
  background-size:20px 20px;opacity:.3;
}
.map-pin{font-size:28px;position:relative;}

/* 버튼 */
.btn-group{display:flex;gap:8px;padding:16px 20px 0;}
.btn{flex:1;padding:12px;border-radius:8px;font-size:13px;text-align:center;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;border:none;}
.btn-k{background:#FEE500;color:#3A1D1D;}
.btn-m{background:#f0ebe0;color:#6b5a3e;}

/* 갤러리 */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:20px;}
.gal-item{aspect-ratio:1;overflow:hidden;background:#f0ebe0;}
.gal-item img{width:100%;height:100%;object-fit:cover;}

/* RSVP */
.rsvp{padding:24px;text-align:center;}
.rsvp-title{font-family:'Noto Serif KR',serif;font-size:16px;color:#333;margin-bottom:8px;}
.rsvp-sub{font-size:12px;color:#999;margin-bottom:16px;}
.rsvp-btn{display:inline-block;padding:12px 32px;background:#1a1410;color:#fff;border-radius:6px;font-size:13px;}

footer{padding:20px;text-align:center;font-size:11px;color:#bbb;background:#faf8f4;}
</style>
</head>
<body>

<div class="hero">
  <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=600&q=80&auto=format&fit=crop" alt="웨딩">
  <div class="hero-overlay">
    <div class="hero-badge">WEDDING INVITATION</div>
    <div class="hero-names">홍길동 ♥ 김영희</div>
    <div class="hero-date">2025년 6월 14일 토요일 오후 2시</div>
  </div>
</div>

<div class="section">
  <div class="section-title">INVITATION</div>
  <div class="invite-text">
    서로가 서로의 곁에 있어<br>
    참 다행이라고 생각합니다<br><br>
    저희 두 사람이<br>
    평생을 함께 걷고자 합니다<br><br>
    오셔서 축복해 주세요
  </div>
</div>

<div class="section">
  <div class="section-title">SCHEDULE</div>
  <div class="schedule">
    <div class="sch-row"><span class="sch-icon">📅</span><div class="sch-text"><strong>2025년 6월 14일 토요일</strong>오후 2시 본식</div></div>
    <div class="sch-row"><span class="sch-icon">📍</span><div class="sch-text"><strong>그랜드볼룸 웨딩홀 3층</strong>서울 강남구 테헤란로 123</div></div>
    <div class="sch-row"><span class="sch-icon">🚗</span><div class="sch-text"><strong>주차 안내</strong>지하 2~3층 (2시간 무료)</div></div>
  </div>
  <div class="map-mock"><span class="map-pin">📍</span></div>
  <div class="btn-group">
    <button class="btn btn-k">💬 카카오로 공유</button>
    <button class="btn btn-m">🗺 길 찾기</button>
  </div>
</div>

<div class="section">
  <div class="section-title">GALLERY</div>
  <div class="gallery">
    <div class="gal-item"><img src="https://images.unsplash.com/photo-1606216794074-735e91aa2c92?w=200&q=70&auto=format&fit=crop" alt=""></div>
    <div class="gal-item"><img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=200&q=70&auto=format&fit=crop" alt=""></div>
    <div class="gal-item"><img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=200&q=70&auto=format&fit=crop" alt=""></div>
  </div>
</div>

<div class="rsvp">
  <div class="rsvp-title">참석 여부를 알려주세요</div>
  <div class="rsvp-sub">6월 7일까지 회신 부탁드립니다</div>
  <div class="rsvp-btn">참석 의사 전달하기</div>
</div>

<footer>Made with ❤️ · 모바일 청첩장 샘플</footer>
</body>
</html>
