<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>투*필 만드는 중… · 휴먼다큐</title>
<meta name="robots" content="noindex">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#1a1714;font-family:'Noto Sans KR',sans-serif;color:#f9f6f0}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}

  .logo{font-size:11px;letter-spacing:.25em;color:rgba(200,135,10,.5);margin-bottom:48px}

  /* 펜 + 줄 애니메이션 */
  .pen-wrap{position:relative;width:64px;height:64px;margin:0 auto 40px}
  .pen-icon{font-size:36px;animation:pen-bob 1.8s ease-in-out infinite;display:block}
  @keyframes pen-bob{
    0%,100%{transform:translateY(0) rotate(-15deg)}
    50%{transform:translateY(-6px) rotate(-10deg)}
  }
  .pen-line{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
    width:0;height:2px;background:#C8870A;border-radius:1px;
    animation:draw-line 1.8s ease-in-out infinite}
  @keyframes draw-line{
    0%{width:0;opacity:1}
    60%{width:48px;opacity:1}
    100%{width:48px;opacity:0}
  }

  /* 점 세 개 */
  .dots{display:flex;gap:8px;justify-content:center;margin-bottom:32px}
  .dot{width:7px;height:7px;border-radius:50%;background:#C8870A;opacity:.2;animation:pulse 1.4s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.25s}
  .dot:nth-child(3){animation-delay:.5s}
  @keyframes pulse{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

  .msg{font-size:17px;font-weight:300;color:#f9f6f0;line-height:1.8;min-height:54px;
    transition:opacity .6s ease;letter-spacing:.02em}
  .msg.fade{opacity:0}

  .sub{font-size:12px;color:rgba(249,246,240,.35);margin-top:16px;line-height:1.8}

  .timeout-box{display:none;margin-top:40px;padding:20px 24px;
    border:1px solid rgba(200,135,10,.3);border-radius:12px;max-width:320px;width:100%}
  .timeout-box p{font-size:14px;color:#C8870A;line-height:1.8;margin-bottom:12px}
  .timeout-box a{display:inline-block;font-size:13px;color:rgba(249,246,240,.5);text-decoration:underline}

  .progress-bar{width:100%;max-width:240px;height:2px;background:rgba(200,135,10,.15);
    border-radius:1px;margin:28px auto 0;overflow:hidden}
  .progress-fill{height:100%;width:0%;background:#C8870A;border-radius:1px;
    transition:width .5s linear}
</style>
</head>
<body>

<div class="logo">HUMANDOCU · 투*필</div>

<div class="pen-wrap">
  <span class="pen-icon">✍️</span>
  <div class="pen-line"></div>
</div>

<div class="dots">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<div class="msg" id="msg">AI가 사진을 읽고 있어요...</div>

<div class="sub" id="sub">오늘의 하루를 시로 담는 중입니다<br>잠시만 기다려주세요</div>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="timeout-box" id="timeout-box">
  <p>시간이 조금 걸리고 있어요.<br>결과는 이메일로 보내드렸습니다.</p>
  <a href="https://humandocu.com">← 홈으로 돌아가기</a>
</div>

<script>
(function () {
  var API_KEY = "AIzaSyBLUc8MUfkUCD8pkfRPZw_CF_Is9ifuLG0";
  var PROJECT  = "humandocu-93c65";
  var RESULT_BASE = "https://humandocu-server-production.up.railway.app/sixshot/";
  var POLL_MS  = 10000;
  var MAX_MS   = 5 * 60 * 1000;  // 5분
  var WINDOW_MS = 10 * 60 * 1000; // 10분 이내 생성된 것만

  var messages = [
    "AI가 사진을 읽고 있어요...",
    "오늘의 감정을 찾고 있어요...",
    "시를 쓰고 있어요...",
    "거의 다 됐어요..."
  ];

  // URL에서 email 추출
  var params = new URLSearchParams(window.location.search);
  var email  = (params.get("email") || "").trim().toLowerCase();

  var msgEl      = document.getElementById("msg");
  var timeoutBox = document.getElementById("timeout-box");
  var progressEl = document.getElementById("progress");
  var msgIdx     = 0;
  var started    = Date.now();
  var pollTimer, msgTimer;

  // 메시지 순환
  function nextMsg() {
    msgEl.classList.add("fade");
    setTimeout(function () {
      msgIdx = (msgIdx + 1) % messages.length;
      msgEl.textContent = messages[msgIdx];
      msgEl.classList.remove("fade");
    }, 600);
  }
  msgTimer = setInterval(nextMsg, 3000);

  // 진행 바 업데이트
  function updateProgress() {
    var pct = Math.min(((Date.now() - started) / MAX_MS) * 100, 98);
    progressEl.style.width = pct + "%";
  }
  setInterval(updateProgress, 500);

  // Firestore runQuery
  function queryFirestore() {
    if (!email) return;
    var windowStart = new Date(Date.now() - WINDOW_MS).toISOString();
    var url = "https://firestore.googleapis.com/v1/projects/" + PROJECT +
              "/databases/(default)/documents:runQuery?key=" + API_KEY;
    var body = JSON.stringify({
      structuredQuery: {
        from: [{collectionId: "sixshot"}],
        where: {
          compositeFilter: {
            op: "AND",
            filters: [
              {fieldFilter: {field: {fieldPath: "type"},  op: "EQUAL",               value: {stringValue: "today"}}},
              {fieldFilter: {field: {fieldPath: "email"}, op: "EQUAL",               value: {stringValue: email}}},
              {fieldFilter: {field: {fieldPath: "created_at"}, op: "GREATER_THAN_OR_EQUAL", value: {stringValue: windowStart}}}
            ]
          }
        },
        orderBy: [{field: {fieldPath: "created_at"}, direction: "DESCENDING"}],
        limit: 1
      }
    });

    fetch(url, {method: "POST", headers: {"Content-Type": "application/json"}, body: body})
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var doc = data && data[0] && data[0].document;
        if (doc && doc.name) {
          var docId = doc.name.split("/").pop();
          clearInterval(pollTimer);
          clearInterval(msgTimer);
          progressEl.style.width = "100%";
          msgEl.textContent = "완성됐어요! 이동합니다 ✦";
          setTimeout(function () {
            window.location.href = RESULT_BASE + docId;
          }, 800);
        }
      })
      .catch(function () {});
  }

  // 타임아웃
  function onTimeout() {
    clearInterval(pollTimer);
    clearInterval(msgTimer);
    msgEl.textContent = "이메일을 확인해주세요 📬";
    document.getElementById("sub").style.display = "none";
    timeoutBox.style.display = "block";
    progressEl.style.width = "100%";
    progressEl.style.background = "rgba(200,135,10,.3)";
  }
  setTimeout(onTimeout, MAX_MS);

  // email 없으면 폴링 없이 타임아웃 메시지만
  if (!email) {
    onTimeout();
    return;
  }

  // 첫 조회는 15초 후 시작 (AI 처리 최소 시간)
  setTimeout(function () {
    queryFirestore();
    pollTimer = setInterval(queryFirestore, POLL_MS);
  }, 15000);
})();
</script>
</body>
</html>
