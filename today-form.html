<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투.필 만들기 · 휴먼다큐</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC4Ql4Ql4Ql4Ql4Ql4Ql4Ql4Ql4Ql4Ql4",
    authDomain: "humandocu-93c65.firebaseapp.com",
    projectId: "humandocu-93c65",
    storageBucket: "humandocu-93c65.appspot.com",
  };

  const fbApp = initializeApp(firebaseConfig);
  const storage = getStorage(fbApp);
  window._fbStorage = storage;
  window._fbRef = ref;
  window._fbUploadBytes = uploadBytes;
  window._fbGetDownloadURL = getDownloadURL;
  console.log('[Firebase] Storage 초기화 완료');
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#F9F6F0;color:#1A1208;font-family:'Noto Sans KR',sans-serif;font-weight:300;min-height:100vh;-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(249,246,240,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,135,10,.2);padding:13px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Noto Serif KR',serif;font-size:14px;color:#1A1208;text-decoration:none}
.logo span{color:#C8A96E}
.nav-back{font-size:13px;color:#C8870A;text-decoration:none}
.wrap{max-width:480px;margin:0 auto;padding:80px 20px 60px}

/* 헤더 */
.form-header{text-align:center;margin-bottom:36px}
.form-kicker{font-size:11px;color:#9e8250;letter-spacing:.15em;margin-bottom:8px}
.form-title{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:300;color:#1A1208;margin-bottom:8px}
.form-sub{font-size:13px;color:#8A6A3A;line-height:1.7}

/* 사진 그리드 */
.shots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.shot-slot{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;cursor:pointer;border:2px dashed rgba(200,135,10,.3);background:#FFF8ED;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:border-color .2s}
.shot-slot:hover{border-color:rgba(200,135,10,.6)}
.shot-slot .plus{font-size:24px;color:rgba(200,135,10,.4)}
.shot-slot .shot-num{font-size:10px;color:#9e8250;letter-spacing:.06em}
.shot-slot img{width:100%;height:100%;object-fit:cover;display:block}
.shot-caption-wrap{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.65));padding:20px 6px 6px}
.shot-caption{width:100%;background:transparent;border:none;color:#fff;font-size:10px;font-family:'Noto Sans KR',sans-serif;outline:none;placeholder-color:rgba(255,255,255,.6)}
.shot-del{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:12px;cursor:pointer;line-height:1;padding:0;display:flex;align-items:center;justify-content:center}

/* 입력 */
.field{margin-bottom:14px}
.field label{font-size:12px;color:#8A6A3A;display:block;margin-bottom:6px;font-weight:400}
.field input{width:100%;padding:12px 14px;border:1px solid rgba(200,135,10,.3);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:#1A1208;outline:none;transition:border-color .2s}
.field input:focus{border-color:#C8870A}
.field-hint{font-size:11px;color:#9e8250;margin-top:4px}

/* 공개여부 */
.public-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;padding:12px 14px;background:#fff;border:1px solid rgba(200,135,10,.2);border-radius:8px}
.public-row input{width:18px;height:18px;accent-color:#C8870A;flex-shrink:0}
.public-row label{font-size:13px;color:#8A6A3A;cursor:pointer;line-height:1.5}

/* 제출 버튼 */
.submit-btn{width:100%;padding:16px;background:#C8870A;color:#FFF8ED;border:none;border-radius:8px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:.06em;transition:background .2s}
.submit-btn:hover{background:#A06008}
.submit-btn:disabled{background:#c8a96e;cursor:not-allowed}
.submit-hint{text-align:center;font-size:12px;color:#9e8250;margin-top:10px}

/* 로딩 */
.loading-wrap{display:none;text-align:center;padding:60px 20px}
.loading-icon{font-size:40px;margin-bottom:20px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.loading-title{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:300;margin-bottom:10px}
.loading-sub{font-size:13px;color:#9e8250;line-height:1.8}
.loading-dots{font-size:20px;color:#C8870A;letter-spacing:6px;margin-top:16px}

/* 결과 */
.result-wrap{display:none}
.result-header{text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid rgba(200,135,10,.15)}
.result-name{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:300;margin-bottom:4px}
.result-date{font-size:12px;color:#9e8250}
.result-box{background:#fff;border:1px solid rgba(200,135,10,.18);border-radius:10px;padding:22px;margin-bottom:14px}
.result-label{font-size:10px;color:#C8870A;letter-spacing:.15em;margin-bottom:12px;font-weight:500}
.result-poem{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:300;line-height:2.1;color:#1A1208;white-space:pre-line}
.result-identity{background:rgba(200,135,10,.08);border-radius:8px;padding:14px;margin-bottom:14px;text-align:center;font-size:15px;font-weight:500;color:#C8870A}
.result-overall{font-size:14px;font-weight:300;line-height:1.9;color:#3D2E1A;white-space:pre-line}

/* 액션 버튼 */
.action-row{display:flex;gap:10px;margin-bottom:12px}
.btn-edit{flex:1;padding:13px;background:#fff;border:1.5px solid rgba(200,135,10,.4);border-radius:8px;font-size:13px;font-weight:500;color:#C8870A;cursor:pointer;font-family:inherit}
.btn-save{flex:1;padding:13px;background:#C8870A;border:none;border-radius:8px;font-size:13px;font-weight:600;color:#FFF8ED;cursor:pointer;font-family:inherit}

/* 공유 */
.share-box{background:#fff;border:1px solid rgba(200,135,10,.18);border-radius:10px;padding:20px;text-align:center;display:none}
.share-label{font-size:12px;color:#9e8250;margin-bottom:14px}
.share-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btn-kakao{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:#FEE500;border:none;border-radius:20px;font-size:13px;color:#3C1E1E;cursor:pointer;font-family:inherit;font-weight:600}
.btn-email{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:#fff;border:1px solid rgba(200,135,10,.4);border-radius:20px;font-size:13px;color:#C8870A;cursor:pointer;font-family:inherit}
.btn-copy{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:#fff;border:1px solid rgba(200,135,10,.25);border-radius:20px;font-size:13px;color:#9e8250;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<nav>
  <a href="/today.html" class="logo nav-back">← 투.필</a>
  <a href="/index.html" class="logo">휴먼다큐<span>닷컴</span></a>
</nav>

<div class="wrap">

  <!-- 입력 폼 -->
  <div id="tf-input">
    <div class="form-header">
      <div class="form-kicker">TODAY FILMOGRAPHY</div>
      <div class="form-title">오늘의 투.필 만들기</div>
      <div class="form-sub">사진 6장 + 한줄 설명<br>AI가 오늘의 당신을 시로 남깁니다</div>
    </div>

    <div class="shots-grid" id="shots-grid"></div>

    <div class="field">
      <label>이름 또는 닉네임 *</label>
      <input id="tf-name" type="text" placeholder="예: 재우, 봄날, 김재우">
    </div>
    <div class="field">
      <label>이메일 * <span style="font-size:11px;color:#9e8250">— 나중에 내 기록 찾을 때 사용</span></label>
      <input id="tf-email" type="email" placeholder="your@email.com">
    </div>

    <div class="public-row">
      <input type="checkbox" id="tf-public" checked>
      <label for="tf-public">공개 — 다른 사람들도 내 투.필을 볼 수 있어요<br><span style="font-size:11px;color:#9e8250">체크 해제 시 나만 볼 수 있는 링크로</span></label>
    </div>

    <button class="submit-btn" id="tf-submit-btn" onclick="tfSubmit()">투.필 만들기 →</button>
    <div class="submit-hint">무료 · AI가 시를 쓰는 데 약 30초~1분</div>
  </div>

  <!-- 로딩 -->
  <div class="loading-wrap" id="tf-loading">
    <div class="loading-icon">✦</div>
    <div class="loading-title">AI가 오늘을 시로 쓰고 있어요</div>
    <div class="loading-sub">사진을 읽고 당신만의 시를 만드는 중입니다<br>잠시만 기다려주세요</div>
    <div class="loading-dots" id="tf-dots">•••</div>
  </div>

  <!-- 결과 -->
  <div class="result-wrap" id="tf-result">
    <div class="result-header">
      <div class="result-name" id="r-name"></div>
      <div class="result-date" id="r-date"></div>
    </div>

    <div class="result-box">
      <div class="result-label">✦ 오늘을 담은 시</div>
      <div class="result-poem" id="r-poem"></div>
    </div>

    <div class="result-identity" id="r-identity"></div>

    <div class="result-box">
      <div class="result-label">오늘 하루 총평</div>
      <div class="result-overall" id="r-overall"></div>
    </div>

    <div class="action-row">
      <button class="btn-edit" onclick="tfEdit()">✏️ 수정하기</button>
      <button class="btn-save" id="r-save-btn" onclick="tfSave()">✓ 저장하기</button>
    </div>

    <div class="share-box" id="r-share">
      <div class="share-label">저장 완료! 공유하거나 이메일로 받으세요</div>
      <div class="share-btns">
        <button class="btn-kakao" onclick="tfKakao()">카카오톡 공유</button>
        <button class="btn-email" id="r-email-btn" onclick="tfEmail()">📬 이메일로 받기</button>
        <button class="btn-copy" onclick="tfCopy()">🔗 링크 복사</button>
      </div>
    </div>
  </div>

</div>

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<script>
const API = 'https://humandocu-server-production-428d.up.railway.app';
const MAX = 6;
let shots = Array(MAX).fill(null); // {file, previewUrl, caption}
let resultData = null;
let dotsTimer = null;

// 슬롯 초기화
function initSlots() {
  const grid = document.getElementById('shots-grid');
  grid.innerHTML = '';
  for (let i = 0; i < MAX; i++) {
    const s = document.createElement('div');
    s.className = 'shot-slot';
    s.id = 'slot-' + i;
    s.innerHTML = '<div class="plus">+</div><div class="shot-num">SHOT ' + (i+1) + '</div>';
    s.onclick = () => pickPhoto(i);
    grid.appendChild(s);
  }
}

function pickPhoto(i) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    shots[i] = {file, previewUrl: url, caption: shots[i]?.caption || ''};
    renderSlot(i);
  };
  inp.click();
}

function renderSlot(i) {
  const s = document.getElementById('slot-' + i);
  const caption = shots[i]?.caption || '';
  s.innerHTML = `
    <img src="${shots[i].previewUrl}" style="width:100%;height:100%;object-fit:cover">
    <div class="shot-caption-wrap">
      <input class="shot-caption" placeholder="한줄 설명..." value="${caption}"
        onclick="event.stopPropagation()"
        oninput="shots[${i}].caption=this.value">
    </div>
    <button class="shot-del" onclick="event.stopPropagation();removeSlot(${i})">×</button>`;
  s.onclick = () => pickPhoto(i);
}

function removeSlot(i) {
  shots[i] = null;
  const s = document.getElementById('slot-' + i);
  s.innerHTML = '<div class="plus">+</div><div class="shot-num">SHOT '+(i+1)+'</div>';
  s.onclick = () => pickPhoto(i);
}

async function tfSubmit() {
  const name  = document.getElementById('tf-name').value.trim();
  const email = document.getElementById('tf-email').value.trim();
  const isPublic = document.getElementById('tf-public').checked;
  const filled = shots.filter(s => s && s.file);

  if (!name)  { alert('이름을 입력해주세요'); return; }
  if (!email || !email.includes('@')) { alert('이메일을 입력해주세요'); return; }
  if (filled.length < 1) { alert('사진을 1장 이상 올려주세요'); return; }

  // 로딩
  document.getElementById('tf-input').style.display = 'none';
  document.getElementById('tf-loading').style.display = 'block';
  dotsTimer = setInterval(() => {
    const d = document.getElementById('tf-dots');
    if (d) d.textContent = d.textContent.length >= 9 ? '•' : d.textContent + '••';
  }, 700);

  try {
    // 1. Firebase Storage에 사진 업로드
    const storage = window._fbStorage;
    const fbRef   = window._fbRef;
    const upload  = window._fbUploadBytes;
    const getUrl  = window._fbGetDownloadURL;

    const shotPayload = [];
    for (let i = 0; i < MAX; i++) {
      if (!shots[i]?.file) continue;
      const fname = `today/${Date.now()}_shot${i+1}_${Math.random().toString(36).slice(2,8)}.jpg`;
      const sref  = fbRef(storage, fname);
      await upload(sref, shots[i].file);
      const url = await getUrl(sref);
      shotPayload.push({image_url: url, caption: shots[i].caption || '', index: i+1});
    }

    // 2. 서버에 URL + 캡션 전송
    const res = await fetch(API + '/api/today/submit-url', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name, email, is_public: isPublic, shots: shotPayload})
    });
    const data = await res.json();
    clearInterval(dotsTimer);

    if (!data.ok) throw new Error(data.error || '오류가 발생했어요');

    resultData = data;
    showResult(name, data);

  } catch(e) {
    clearInterval(dotsTimer);
    document.getElementById('tf-loading').style.display = 'none';
    document.getElementById('tf-input').style.display = 'block';
    alert('오류: ' + e.message + '\n잠시 후 다시 시도해주세요');
  }
}

function showResult(name, data) {
  document.getElementById('tf-loading').style.display = 'none';
  const today = new Date().toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'short'});
  document.getElementById('r-name').textContent = name + '님의 오늘';
  document.getElementById('r-date').textContent = today;
  document.getElementById('r-poem').textContent = data.poems?.['대표'] || '';
  document.getElementById('r-identity').textContent = data.identity || '';
  document.getElementById('r-overall').textContent = data.overall || '';
  document.getElementById('tf-result').style.display = 'block';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function tfEdit() {
  document.getElementById('tf-result').style.display = 'none';
  document.getElementById('tf-input').style.display = 'block';
  // 사진/텍스트 그대로 유지됨
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function tfSave() {
  const btn = document.getElementById('r-save-btn');
  btn.textContent = '✓ 저장됨';
  btn.disabled = true;
  document.getElementById('r-share').style.display = 'block';
  document.getElementById('r-share').scrollIntoView({behavior:'smooth'});
}

function tfKakao() {
  if (!resultData) return;
  if (!window.Kakao || !Kakao.isInitialized()) {
    Kakao.init('5b7821698a09c74f1d72c0b52165d557');
  }
  const name = document.getElementById('tf-name').value.trim();
  const imgs = resultData.shot_images || {};
  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: name + '님의 오늘 · 투.필 TODAY FILMOGRAPHY',
      description: resultData.identity || '사진 6장으로 담은 오늘',
      imageUrl: Object.values(imgs)[0] || 'https://humandocu.com/today_og.png',
      link: {mobileWebUrl: resultData.page_url, webUrl: resultData.page_url}
    },
    buttons: [
      {title: '전체 투.필 보기', link: {mobileWebUrl: resultData.page_url, webUrl: resultData.page_url}},
      {title: '나도 만들기', link: {mobileWebUrl: 'https://humandocu.com/today-form.html', webUrl: 'https://humandocu.com/today-form.html'}}
    ]
  });
}

async function tfEmail() {
  if (!resultData) return;
  const btn = document.getElementById('r-email-btn');
  btn.textContent = '전송 중...'; btn.disabled = true;
  try {
    const res = await fetch(API + '/api/my/send-link', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: document.getElementById('tf-name').value.trim(),
        email: document.getElementById('tf-email').value.trim()
      })
    });
    const d = await res.json();
    btn.textContent = d.ok ? '✓ 이메일 발송됨' : '📬 이메일로 받기';
    if (!d.ok) btn.disabled = false;
  } catch(e) { btn.textContent = '📬 이메일로 받기'; btn.disabled = false; }
}

function tfCopy() {
  if (!resultData?.page_url) return;
  navigator.clipboard?.writeText(resultData.page_url)
    .then(() => alert('링크가 복사됐어요!\n카톡·인스타에 붙여 넣으세요'));
}

initSlots();
</script>
</body>
</html>
