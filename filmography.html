<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 필모그래피 · 휴먼다큐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --serif:'Cormorant Garamond','Noto Serif KR',Georgia,serif;
  --sans:'Noto Sans KR',sans-serif;
  --dark:#0f0d09;
  --gold:#C8A96E;
  --amber:#C8870A;
  --ink:#1A1208;
  --ink3:#8A6A3A;
  --cream:#f9f6f0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--dark);color:var(--cream);font-family:var(--sans);font-weight:300;line-height:1.9;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:16px 48px;background:rgba(15,13,9,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(200,169,110,.12)}
.logo{font-family:var(--serif);font-size:15px;font-weight:300;color:rgba(249,246,240,.6);letter-spacing:.08em}
.logo span{color:var(--gold)}
@media(max-width:640px){nav{padding:12px 20px}}

.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 24px 80px;text-align:center;position:relative}
.wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 60%,rgba(200,169,110,.05) 0%,transparent 70%);pointer-events:none}

.kicker{font-size:11px;font-weight:500;letter-spacing:.25em;color:rgba(200,169,110,.5);margin-bottom:24px}
.title{font-family:var(--serif);font-size:clamp(28px,5vw,56px);font-weight:300;color:#f5e8c8;line-height:1.6;letter-spacing:.06em;margin-bottom:16px}
.sub{font-size:15px;color:rgba(200,169,110,.6);line-height:2.2;max-width:380px;margin:0 auto 56px;font-weight:300}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:580px;width:100%}
@media(max-width:500px){.cards{grid-template-columns:1fr;gap:16px;max-width:320px}}

.card{border-radius:8px;padding:36px 28px;text-align:left;transition:all .25s;display:block;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px)}

.card-today{background:rgba(200,169,110,.06);border:1px solid rgba(200,169,110,.25)}
.card-today:hover{background:rgba(200,169,110,.1);border-color:rgba(200,169,110,.5)}

.card-life{background:rgba(200,135,10,.04);border:1px solid rgba(200,135,10,.15)}
.card-life:hover{background:rgba(200,135,10,.08);border-color:rgba(200,135,10,.35)}

.badge{font-size:10px;font-weight:500;letter-spacing:.2em;display:inline-block;padding:3px 12px;border-radius:20px;margin-bottom:16px}
.card-today .badge{color:var(--gold);background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.2)}
.card-life .badge{color:rgba(200,135,10,.85);background:rgba(200,135,10,.08);border:1px solid rgba(200,135,10,.2)}

.card-title{font-family:var(--serif);font-size:clamp(22px,3vw,28px);font-weight:300;color:#f5e8c8;line-height:1.5;margin-bottom:10px;letter-spacing:.04em}
.card-desc{font-size:13px;color:rgba(200,169,110,.55);line-height:1.9;font-weight:300;margin-bottom:22px}
.card-life .card-desc{color:rgba(200,135,10,.5)}
.card-arrow{font-size:12px;letter-spacing:.1em;transition:color .2s}
.card-today .card-arrow{color:rgba(200,169,110,.4)}
.card-today:hover .card-arrow{color:var(--gold)}
.card-life .card-arrow{color:rgba(200,135,10,.4)}
.card-life:hover .card-arrow{color:var(--amber)}

footer{padding:24px;text-align:center;border-top:1px solid rgba(200,169,110,.08)}
.ft{font-size:11px;color:rgba(200,169,110,.2);letter-spacing:.08em}
</style>
</head>
<body>

<nav>
  <a href="/index.html" class="logo">휴먼다큐<span>닷컴</span></a>
</nav>

<div class="wrap">
  <div class="kicker">FILMOGRAPHY · 나의 필모그래피</div>
  <h1 class="title">당신의 삶을<br>어떻게 기록하겠습니까</h1>
  <p class="sub">오늘을 기록하거나, 인생을 기록하거나.<br>당신의 방식으로 시작하세요.</p>

  <div class="cards">
    <a href="/today.html" class="card card-today">
      <div class="badge">투.필 · TODAY</div>
      <div class="card-title">오늘의<br>필모그래피</div>
      <div class="card-desc">오늘 찍은 사진 6장.<br>지금 이 순간을 기록하세요.</div>
      <div style="margin-top:20px;display:block;background:#C8A96E;color:#0f0d09;font-size:14px;font-weight:700;padding:12px 0;border-radius:4px;text-align:center;letter-spacing:.04em">시작하기 →</div>
    </a>

    <a href="/sixshot.html" class="card card-life">
      <div class="badge">인생 식스샷 · LIFE</div>
      <div class="card-title">인생<br>식스샷</div>
      <div class="card-desc">인생을 담은 사진 6장.<br>나만의 필모그래피를 만드세요.</div>
      <div style="margin-top:20px;display:block;background:rgba(200,135,10,.15);color:#C8870A;font-size:14px;font-weight:700;padding:12px 0;border-radius:4px;text-align:center;border:1px solid rgba(200,135,10,.4);letter-spacing:.04em">시작하기 →</div>
    </a>
  </div>
</div>

<footer>
  <div class="ft">© 2026 휴먼다큐 · humandocu.com</div>
</footer>

</body>
</html>
