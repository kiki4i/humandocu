<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="휴먼다큐 · 삶을 기록합니다">
<meta property="og:description" content="나의 필모그래피와 디지털 부고 서비스.">
<meta property="og:url" content="https://humandocu.com">
<meta property="og:image" content="https://humandocu.com/og_main.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://humandocu.com/og_main.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #F9F6F0;
  --ink:   #1A1208;
  --ink2:  #3D2E1A;
  --ink3:  #6B5340;
  --gold:  #C8A96E;
  --gold-dk: #A8843A;
  --navy:  #1A2535;
  --serif: 'Cormorant Garamond','Noto Serif KR',Georgia,serif;
  --sans:  'Noto Sans KR',sans-serif;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:15px; font-weight:300; line-height:1.7; overflow-x:hidden; -webkit-font-smoothing:antialiased; }
a { text-decoration:none; color:inherit; }

/* ── NAV ── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 20px;
  background:rgba(249,246,240,.97); backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(200,169,110,.22);
}
.nav-logo { display:flex; align-items:center; gap:8px; }
.nav-logo-mark {
  width:26px; height:26px; border-radius:4px;
  background:var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--serif); font-size:13px; font-weight:400; color:var(--ink);
}
.nav-logo-text { font-family:var(--serif); font-size:16px; color:var(--ink); letter-spacing:.04em; }
.nav-tel { font-size:13px; color:var(--ink3); }
.nav-tel a { color:var(--gold-dk); font-weight:400; }

/* ── LANDING ── */
.landing {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:76px 20px 40px;
  background:var(--bg);
}
.landing-inner {
  width:100%; max-width:440px;
  display:flex; flex-direction:column; align-items:center;
  text-align:center;
}

/* eyebrow */
.landing-label {
  display:flex; align-items:center; gap:10px;
  font-size:11px; font-weight:400; letter-spacing:.2em;
  color:var(--ink3); text-transform:uppercase;
  margin-bottom:16px;
}
.landing-label::before,
.landing-label::after { content:''; width:18px; height:1px; background:var(--gold); opacity:.7; }

/* headline */
.landing-title {
  font-family:var(--serif);
  font-size:28px;
  font-weight:400;
  color:var(--ink);
  letter-spacing:.04em;
  line-height:1.25;
  margin-bottom:10px;
}

/* subtitle */
.landing-sub {
  font-size:15px; font-weight:300;
  color:var(--ink2); letter-spacing:.05em;
  margin-bottom:28px;
}

/* divider */
.landing-divider {
  width:28px; height:1px;
  background:var(--gold); opacity:.45;
  margin-bottom:28px;
}

/* ── CARDS ── */
.cards { display:flex; flex-direction:column; gap:10px; width:100%; }

.card {
  display:flex; align-items:center; gap:16px;
  padding:22px 20px;
  border-radius:10px;
  transition:transform .15s, box-shadow .15s;
  text-decoration:none;
  -webkit-tap-highlight-color:transparent;
}
.card:active { transform:scale(.98); }

/* SIX SHOT — amber gold */
.card-six {
  background:#C8A96E;
  border:2px solid #A8843A;
}
.card-six:hover { transform:translateY(-2px); box-shadow:0 6px 22px rgba(168,132,58,.35); }

/* MEMORIAL — dark navy */
.card-mem {
  background:#1A2535;
  border:2px solid rgba(200,169,110,.35);
}
.card-mem:hover { transform:translateY(-2px); box-shadow:0 6px 22px rgba(26,37,53,.4); }

.card-body { flex:1; min-width:0; text-align:left; }

/* card label (SIX SHOT / MEMORIAL) */
.card-lbl {
  font-size:10px; font-weight:500; letter-spacing:.2em;
  text-transform:uppercase; margin-bottom:5px;
}
.card-six .card-lbl  { color:rgba(15,13,9,.5); }
.card-mem .card-lbl  { color:rgba(200,169,110,.65); }

/* card headline */
.card-ttl {
  font-family:var(--serif);
  font-size:20px; font-weight:400;
  line-height:1.3; margin-bottom:5px; letter-spacing:.01em;
}
.card-six .card-ttl { color:#0F0D09; }
.card-mem .card-ttl { color:#F9F6F0; }

/* card description */
.card-dsc { font-size:13px; font-weight:300; line-height:1.6; }
.card-six .card-dsc { color:rgba(15,13,9,.62); }
.card-mem .card-dsc { color:rgba(249,246,240,.55); }

/* 시작하기 → button */
.card-btn {
  display:inline-block;
  margin-top:14px;
  font-size:13px; font-weight:600; font-family:var(--sans);
  padding:7px 18px; border-radius:20px;
  letter-spacing:.04em;
  transition:background .15s, border-color .15s;
}
.card-six .card-btn {
  background:rgba(15,13,9,.2);
  color:#0F0D09;
}
.card-six:hover .card-btn { background:rgba(15,13,9,.3); }

.card-mem .card-btn {
  background:transparent;
  color:#C8A96E;
  border:1.5px solid rgba(200,169,110,.55);
}
.card-mem:hover .card-btn { background:rgba(200,169,110,.1); border-color:#C8A96E; }

/* arrow */
.card-arrow { font-size:22px; font-weight:300; line-height:1; flex-shrink:0; }
.card-six .card-arrow { color:rgba(15,13,9,.35); }
.card-mem .card-arrow { color:rgba(200,169,110,.45); }

/* ── CONNECT ── */
.landing-connect {
  margin-top:20px;
  font-size:11px; font-weight:300;
  color:var(--ink3); letter-spacing:.08em;
}

/* ── FOOTER ── */
footer {
  padding:16px 20px;
  text-align:center;
  border-top:1px solid rgba(200,135,10,.15);
  background:var(--bg);
}
footer p { font-size:12px; color:var(--ink3); font-weight:300; line-height:2.2; }
footer a { color:var(--ink2); transition:color .15s; }
footer a:hover { color:var(--gold-dk); }
.ft-phone { color:var(--gold-dk) !important; font-weight:400; }

/* ── DESKTOP ── */
@media (min-width:640px) {
  nav { padding:14px 48px; }
  .landing { padding:100px 40px 60px; }
  .landing-inner { max-width:500px; }
  .landing-title { font-size:36px; }
  .card { padding:26px 24px; }
  .card-ttl { font-size:22px; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-mark">H</div>
    <span class="nav-logo-text">휴먼다큐</span>
  </a>
  <div class="nav-tel">문의 <a href="tel:031-539-9709">031-539-9709</a></div>
</nav>

<section class="landing">
  <div class="landing-inner">

    <div class="landing-label">humandocu.com</div>

    <h1 class="landing-title">삶을 기록합니다</h1>
    <p class="landing-sub">나를, 그리고 우리를</p>

    <div class="landing-divider"></div>

    <div class="cards">

      <a href="/sixshot.html" class="card card-six">
        <div class="card-body">
          <div class="card-lbl">SIX SHOT</div>
          <div class="card-ttl">나의 필모그래피</div>
          <div class="card-dsc">사진 6장 · AI 시 · 나를 정의하는 짧은 문장</div>
          <div class="card-btn">시작하기 →</div>
        </div>
        <div class="card-arrow">›</div>
      </a>

      <a href="/memorial.html" class="card card-mem">
        <div class="card-body">
          <div class="card-lbl">MEMORIAL</div>
          <div class="card-ttl">차별화된 부고문과 답례장</div>
          <div class="card-dsc">디지털 부고, 메모리얼페이지, 방명록</div>
          <div class="card-btn">시작하기 →</div>
        </div>
        <div class="card-arrow">›</div>
      </a>

    </div>

    <p class="landing-connect">두 서비스는 연결되어 있습니다</p>

  </div>
</section>

<footer>
  <p>
    © 2026 휴먼다큐닷컴 &nbsp;·&nbsp;
    <a href="/terms.html">이용약관</a> &nbsp;·&nbsp;
    <a href="/privacy.html">개인정보처리방침</a> &nbsp;·&nbsp;
    <a href="tel:031-539-9709" class="ft-phone">031-539-9709</a>
  </p>
</footer>

</body>
</html>
