<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휴먼다큐 · 세상에서 가장 슬픈 소식이지만, 가장 아름다운 기록이 되도록</title>
<meta name="description" content="기계적인 부고 문자는 이제 그만. 고인의 생애를 담은 감동적인 모바일 부고를 3분 만에 만드세요. 베이직 무료 · 어드밴스드 29,000원">
<meta property="og:title" content="휴먼다큐 · 품격 있는 모바일 부고 서비스">
<meta property="og:description" content="슬픔을 기록으로, 그리움을 위로로. 고인의 생애를 기리는 디지털 추모 아카이브.">
<meta property="og:url" content="https://humandocu.com">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f0d09;--ink2:#2d2a22;--ink3:#575349;
  --cream:#f9f6f0;--cream2:#f0ebe0;--cream3:#e5dece;
  --gold:#9e8250;--gold2:#c8a96e;--gold3:#e8d4a8;
  --teal:#2a6b5e;--teal-lt:#e0efeb;
  --serif:'Cormorant Garamond','Noto Serif KR',Georgia,serif;
  --sans:'Noto Sans KR',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --r:3px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);font-weight:300;line-height:1.9;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:16px 56px;background:rgba(15,13,9,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(200,169,110,.15)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:30px;height:30px;background:var(--gold2);border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:15px;color:var(--ink)}
.logo-text{font-family:var(--serif);font-size:18px;color:var(--cream);letter-spacing:.04em}
.nav-links{display:flex;gap:26px;list-style:none}
.nav-links a{font-size:14px;color:rgba(249,246,240,.6);letter-spacing:.04em;transition:color .2s}
.nav-links a:hover{color:var(--gold2)}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-tel{font-size:13px;color:rgba(249,246,240,.45)}
.nav-tel a{color:var(--gold2)}
.nav-btn{font-size:14px;font-weight:500;color:var(--ink);background:var(--gold2);padding:9px 22px;border-radius:var(--r);transition:all .2s}
.nav-btn:hover{background:var(--gold3)}

/* HERO */
.hero{min-height:100vh;background:var(--ink);display:flex;flex-direction:column;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(200,169,110,.08) 0%,transparent 60%),repeating-linear-gradient(0deg,transparent,transparent 79px,rgba(200,169,110,.025) 80px),repeating-linear-gradient(90deg,transparent,transparent 79px,rgba(200,169,110,.025) 80px);pointer-events:none}
.hero-body{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:80px 48px 60px;position:relative;z-index:1;max-width:960px;margin:0 auto;width:100%}
.hero-eyebrow{font-size:12px;font-weight:500;letter-spacing:.22em;color:rgba(200,169,110,.65);text-transform:uppercase;margin-bottom:22px;display:flex;align-items:center;gap:12px;justify-content:center}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:26px;height:1px;background:var(--gold2);opacity:.5}
.hero-title{font-family:var(--serif);font-size:clamp(26px,4.6vw,64px);font-weight:300;line-height:1.2;letter-spacing:-.02em;color:var(--cream);margin-bottom:16px}
.hero-title em{display:block;font-style:italic;color:var(--gold2)}
.hero-slogan{font-family:var(--serif);font-size:17px;font-style:italic;color:rgba(249,246,240,.55);line-height:1.9;margin-bottom:38px;max-width:500px}
.hero-slogan strong{color:rgba(200,169,110,.75);font-weight:400}

/* 요금 카드 */
.hero-plans{display:flex;gap:6px;background:transparent;border-radius:6px;overflow:visible;margin-bottom:32px;width:100%;align-items:stretch}
.hplan{flex:1;padding:28px 22px;background:rgba(255,255,255,.05);transition:background .2s;cursor:pointer;position:relative;border-radius:4px;border:1px solid rgba(255,255,255,.12);margin:0;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
.hplan:hover{background:rgba(255,255,255,.08)}
.hplan.feat{background:rgba(200,169,110,.1);border:1px solid rgba(200,169,110,.28);z-index:1;display:flex;flex-direction:column}
.hplan-pip{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:500;background:var(--gold2);color:var(--ink);padding:3px 14px;border-radius:20px;white-space:nowrap;letter-spacing:.06em}
.hplan-name{font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(249,246,240,.55);margin-bottom:8px}
.hplan.feat .hplan-name{color:var(--gold2)}
.hplan-price{font-family:var(--serif);font-size:32px;font-weight:300;color:var(--cream);line-height:1;margin-bottom:5px}
.hplan.feat .hplan-price{color:var(--cream)}
.hplan-dur{font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;display:inline-block;margin-bottom:12px;letter-spacing:.06em}
.hplan-dur.d5{background:rgba(255,255,255,.09);color:rgba(249,246,240,.6)}
.hplan-dur.d49{background:rgba(42,107,94,.2);color:#7fd4c0}
.hplan-feats{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;flex-grow:1}
.hplan-feats li{font-size:13px;color:rgba(249,246,240,.6);list-style:none;display:flex;gap:6px;align-items:flex-start;text-align:left;line-height:1.55}
.hplan-feats li::before{content:'—';color:rgba(200,169,110,.5);flex-shrink:0;font-size:11px;margin-top:2px}
.hplan.feat .hplan-feats li{color:rgba(249,246,240,.85)}
.hplan.feat .hplan-feats li::before{content:'';width:0;display:none}
.hplan-btn{display:block;padding:11px;text-align:center;border-radius:var(--r);font-size:14px;font-weight:500;transition:all .2s}
.hplan-btn.free{border:1px solid rgba(255,255,255,.2);color:rgba(249,246,240,.65)}
.hplan-btn.free:hover{border-color:var(--gold2);color:var(--gold2)}
.hplan-btn.main{background:var(--gold2);color:var(--ink);font-size:15px}
.hplan-btn.main:hover{background:var(--gold3)}

.hero-note{font-size:13px;color:rgba(249,246,240,.3)}
.hero-note a{color:var(--gold2)}

/* 공통 섹션 */
.sec{padding:88px 56px}
.si{max-width:1060px;margin:0 auto}
.ey{font-size:12px;font-weight:500;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:12px}
.tt{font-family:var(--serif);font-size:clamp(28px,3.2vw,48px);font-weight:300;line-height:1.2;letter-spacing:-.01em;color:var(--ink);margin-bottom:12px}
.tt em{font-style:italic;color:var(--gold)}
.sb{font-size:16px;color:var(--ink2);line-height:1.9;max-width:520px}
.sh{margin-bottom:48px}
.ctr{text-align:center}.ctr .sb{margin:12px auto 0}

/* 비교 */
.compare{background:var(--cream2)}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:rgba(24,22,15,.1);border-radius:4px;overflow:hidden}
.cc{background:var(--cream2);padding:36px 32px}
.cc.sol{background:var(--cream)}
.bdg{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;display:inline-block;padding:3px 11px;border-radius:20px;margin-bottom:14px}
.bdg.old{background:rgba(24,22,15,.09);color:var(--ink2)}
.bdg.new{background:rgba(158,130,80,.12);color:var(--gold)}
.chead{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:12px}
.obox{background:rgba(24,22,15,.05);border:1px solid rgba(24,22,15,.1);border-radius:var(--r);padding:16px;font-size:14px;color:var(--ink2);line-height:1.9;margin-bottom:14px}
.ofrom{font-size:11px;color:rgba(24,22,15,.5);margin-bottom:7px;padding-bottom:6px;border-bottom:1px solid rgba(24,22,15,.08)}
.ck{display:flex;align-items:flex-start;gap:8px;font-size:14px;color:var(--ink2);margin-bottom:8px;line-height:1.6}
.cki{width:17px;height:17px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:2px}
.cki.x{background:rgba(24,22,15,.09);color:var(--ink3)}
.cki.o{background:var(--teal-lt);color:var(--teal)}
.scard{background:var(--cream);border:1px solid rgba(24,22,15,.1);border-radius:5px;overflow:hidden;box-shadow:0 6px 24px rgba(24,22,15,.08);margin-bottom:10px}
.sc-top{background:var(--ink);padding:16px 20px;display:flex;gap:13px}
.sc-ph{width:50px;height:64px;flex-shrink:0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:18px}
.sc-yr{font-size:9px;letter-spacing:.1em;color:rgba(200,169,110,.5);margin-bottom:3px}
.sc-nm{font-family:var(--serif);font-size:18px;color:var(--cream);line-height:1.2;margin-bottom:2px}
.sc-sb{font-size:11px;color:rgba(249,246,240,.65);line-height:1.5}
.sc-bd{padding:14px 20px}
.sc-qt{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--ink2);line-height:1.8;border-left:2px solid rgba(158,130,80,.25);padding-left:11px;margin-bottom:10px}
.sc-tg{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
.sc-t{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid rgba(158,130,80,.2);color:var(--gold)}
.sc-bs{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sc-p{padding:8px;text-align:center;background:var(--ink);border-radius:var(--r);font-size:11px;font-weight:500;color:var(--cream)}
.sc-m{padding:8px;text-align:center;border:1px solid rgba(24,22,15,.12);border-radius:var(--r);font-size:11px;color:var(--ink2)}

/* 신청 과정 */
.process-sec{background:var(--ink)}
.process-sec .tt{color:var(--cream)}
.process-sec .sb{color:rgba(249,246,240,.5)}
.process-steps{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:rgba(255,255,255,.06);margin-top:48px;border-radius:4px;overflow:hidden}
.ps{background:rgba(255,255,255,.02);padding:26px 14px;position:relative;text-align:center}
.ps::after{content:'→';position:absolute;right:-9px;top:50%;transform:translateY(-50%);color:rgba(200,169,110,.25);font-size:13px;z-index:1}
.ps:last-child::after{display:none}
.ps-num{font-family:var(--serif);font-size:26px;font-weight:300;color:rgba(200,169,110,.15);line-height:1;margin-bottom:8px}
.ps-ico{font-size:20px;margin-bottom:7px}
.ps-title{font-size:12px;font-weight:500;color:var(--cream);margin-bottom:5px;line-height:1.3}
.ps-desc{font-size:10px;color:rgba(249,246,240,.45);line-height:1.6}
.ps-time{margin-top:7px;font-size:10px;font-weight:500;color:var(--gold2);letter-spacing:.06em}
.ps.hi{background:rgba(200,169,110,.1);border:1px solid rgba(200,169,110,.2);margin:-1px;z-index:1}
.ps.hi .ps-title{color:var(--gold2)}

/* 방명록 */
.gb-sec{background:var(--cream)}
.gb-grid{display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:center;margin-top:44px}
.gb-mock{background:var(--cream);border:1px solid rgba(24,22,15,.1);border-radius:5px;overflow:hidden;box-shadow:0 10px 36px rgba(24,22,15,.08)}
.gm-bar{background:var(--ink);padding:10px 14px;display:flex;align-items:center;gap:8px}
.gm-dots{display:flex;gap:4px}
.gmd{width:8px;height:8px;border-radius:50%}
.gm-url{flex:1;text-align:center;font-size:9px;color:rgba(255,255,255,.2);font-family:monospace}
.gm-body{padding:16px}
.gm-ttl{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid rgba(24,22,15,.07);display:flex;justify-content:space-between;align-items:center}
.gm-ttl span{color:var(--gold)}
.gm-e{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid rgba(24,22,15,.06)}
.gm-e:last-child{border-bottom:none}
.gm-av{width:28px;height:28px;border-radius:50%;background:var(--cream2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--ink2)}
.gm-nm{font-size:11px;font-weight:500;color:var(--ink);margin-bottom:1px}
.gm-msg{font-size:12px;color:var(--ink2);line-height:1.5}
.gm-tm{font-size:9px;color:rgba(24,22,15,.5);margin-top:1px}
.gm-add{margin-top:10px;padding:9px;border:1.5px dashed rgba(158,130,80,.25);border-radius:var(--r);text-align:center;font-size:11px;color:var(--gold)}
.gb-bdg{display:inline-flex;align-items:center;gap:6px;background:rgba(42,107,94,.1);border:1px solid rgba(42,107,94,.2);border-radius:20px;padding:4px 13px;font-size:11px;font-weight:500;color:var(--teal);margin-bottom:18px;letter-spacing:.06em}
.d49-big{font-family:var(--serif);font-size:72px;font-weight:300;color:var(--gold);line-height:.9;margin-bottom:6px}
.d49-lbl{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:12px}
.d49-desc{font-size:15px;color:var(--ink2);line-height:1.9;margin-bottom:20px}
.gb-feats{display:flex;flex-direction:column;gap:9px}
.gbf{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid rgba(24,22,15,.07)}
.gbf:first-child{border-top:1px solid rgba(24,22,15,.07)}
.gbf-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:7px}
.gbf-txt{font-size:14px;color:var(--ink2);line-height:1.6}
.gbf-txt strong{color:var(--ink);font-weight:500}

/* 아카이브 브릿지 */
.ab-sec{background:var(--ink);padding:88px 56px;position:relative;overflow:hidden}
.ab-sec::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(200,169,110,.05) 0%,transparent 70%);pointer-events:none}
.ab-inner{max-width:880px;margin:0 auto;position:relative;z-index:1}
.ab-flow{display:flex;align-items:stretch;gap:1px;margin:44px 0;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.ab-step{flex:1;padding:24px 18px;text-align:center;position:relative;background:rgba(255,255,255,.02)}
.ab-step.hi{background:rgba(200,169,110,.1);border:1px solid rgba(200,169,110,.2);margin:-1px;z-index:1}
.ab-arr{position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:12px;color:rgba(200,169,110,.25);z-index:2}
.ab-ico{font-size:24px;margin-bottom:8px}
.ab-ttl{font-size:13px;font-weight:500;color:var(--cream);margin-bottom:5px;line-height:1.3}
.ab-step.hi .ab-ttl{color:var(--gold2)}
.ab-desc{font-size:11px;color:rgba(249,246,240,.35);line-height:1.6}
.ab-step.hi .ab-desc{color:rgba(249,246,240,.55)}
.ab-cta{display:inline-flex;align-items:center;gap:12px;background:rgba(200,169,110,.1);border:1px solid rgba(200,169,110,.22);border-radius:var(--r);padding:16px 32px;transition:all .2s}
.ab-cta:hover{background:rgba(200,169,110,.18);border-color:var(--gold2)}
.ab-cta-t{font-size:15px;font-weight:500;color:var(--gold2);margin-bottom:2px}
.ab-cta-s{font-size:13px;color:rgba(249,246,240,.55)}
.ab-cta-arr{font-size:18px;color:var(--gold2)}

/* 휴먼다큐 소개 */
.hd-sec{background:var(--cream2)}
.hd-grid{display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:start;margin-top:44px}
.hd-svcs{display:flex;flex-direction:column;gap:2px;background:rgba(24,22,15,.09);border-radius:4px;overflow:hidden;margin-top:24px}
.hd-svc{background:var(--cream2);padding:18px 20px;display:flex;gap:14px;align-items:flex-start;transition:background .2s}
.hd-svc:hover{background:var(--cream3)}
.hd-svc-n{font-family:var(--serif);font-size:20px;font-weight:300;color:rgba(158,130,80,.28);flex-shrink:0;line-height:1;margin-top:2px}
.hd-svc-t{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:3px}
.hd-svc-d{font-size:13px;color:var(--ink2);line-height:1.6}
.hd-qt{font-family:var(--serif);font-size:clamp(20px,2.3vw,34px);font-weight:300;line-height:1.5;color:var(--ink);margin-bottom:16px}
.hd-qt em{font-style:italic;color:var(--gold)}
.hd-sub{font-size:15px;color:var(--ink2);line-height:1.9;margin-bottom:6px}
.hd-attr{font-size:13px;color:var(--ink2);margin-bottom:22px}
.hd-btn{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:500;color:var(--cream);background:var(--ink);padding:12px 28px;border-radius:var(--r);transition:all .2s}
.hd-btn:hover{background:var(--gold)}

/* 답례장 섹션 */
.reply-sec{background:var(--ink);position:relative;overflow:hidden}
.reply-features{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:32px 0}
.rf-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:5px;padding:22px 20px}
.rf-ico{font-size:22px;margin-bottom:10px}
.rf-ttl{font-size:14px;font-weight:500;color:var(--cream);margin-bottom:5px}
.rf-desc{font-size:12px;color:rgba(249,246,240,.5);line-height:1.6}

/* 후기 */
.testi-sec{background:var(--cream2)}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:rgba(24,22,15,.09);margin-top:44px}
.tcard{background:var(--cream2);padding:32px 26px}
.stars{font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:12px}
.ttext{font-family:var(--serif);font-size:15px;font-style:italic;color:var(--ink2);line-height:1.9;margin-bottom:14px}
.tby{font-size:13px;color:var(--ink2)}
.tby span{color:var(--gold)}
.tplan{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;background:rgba(158,130,80,.1);color:var(--gold);margin-left:4px}

/* FAQ */
.faq-sec{background:var(--cream)}
.faq-inner{max-width:660px;margin:0 auto}
.faq-item{border-bottom:1px solid rgba(24,22,15,.09);overflow:hidden}
.faq-q{padding:18px 0;font-size:15px;color:var(--ink);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:14px;transition:color .2s}
.faq-q:hover{color:var(--gold)}
.faq-arr{font-size:16px;color:var(--gold);flex-shrink:0;transition:transform .3s}
.faq-item.open .faq-arr{transform:rotate(45deg)}
.faq-a{font-size:14px;color:var(--ink2);line-height:1.9;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s}
.faq-item.open .faq-a{max-height:220px;padding-bottom:18px}

/* CTA */
.cta-sec{padding:100px 56px;text-align:center;background:var(--ink);position:relative;overflow:hidden}
.cta-sec::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 100%,rgba(200,169,110,.06) 0%,transparent 65%);pointer-events:none}
.cta-kicker{font-size:12px;font-weight:500;letter-spacing:.2em;color:rgba(200,169,110,.5);text-transform:uppercase;margin-bottom:16px;position:relative;z-index:1}
