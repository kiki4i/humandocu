<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>휴먼다큐 아이콘 생성</title>
</head>
<body style="margin:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif">

<div style="text-align:center">
  <h2 style="margin-bottom:24px;color:#333">아이콘 파일 만들기 안내</h2>

  <!-- 512x512 아이콘 미리보기 -->
  <canvas id="icon" width="512" height="512" style="border-radius:24px;box-shadow:0 8px 32px rgba(0,0,0,.2);display:block;margin:0 auto 20px"></canvas>

  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <button onclick="download(512)" style="padding:12px 24px;background:#1a1714;color:#f0ebe2;border:none;border-radius:6px;font-size:14px;cursor:pointer">icon-512.png 저장</button>
    <button onclick="download(192)" style="padding:12px 24px;background:#b8975a;color:#1a1714;border:none;border-radius:6px;font-size:14px;cursor:pointer">icon-192.png 저장</button>
  </div>

  <p style="margin-top:20px;color:#666;font-size:13px;max-width:400px">
    두 파일을 저장한 후 GitHub 저장소에 <strong>icons</strong> 폴더를 만들고 업로드하세요.
  </p>
</div>

<script>
const canvas = document.getElementById('icon');
const ctx = canvas.getContext('2d');
const s = 512;

// 배경
ctx.fillStyle = '#1a1714';
ctx.beginPath();
ctx.roundRect(0, 0, s, s, 80);
ctx.fill();

// 골드 장식선
ctx.strokeStyle = 'rgba(184,151,90,.3)';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.roundRect(24, 24, s-48, s-48, 60);
ctx.stroke();

// 글자 H — 세리프 스타일
ctx.fillStyle = '#b8975a';
ctx.font = 'bold 240px Georgia, serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('H', s/2, s/2 - 30);

// 하단 텍스트
ctx.fillStyle = 'rgba(184,151,90,.7)';
ctx.font = '500 52px Georgia, serif';
ctx.fillText('HUMAN DOCU', s/2, s/2 + 140);

// 점 장식
ctx.fillStyle = '#b8975a';
ctx.beginPath();
ctx.arc(s/2 - 80, s/2 + 185, 5, 0, Math.PI*2);
ctx.fill();
ctx.beginPath();
ctx.arc(s/2 + 80, s/2 + 185, 5, 0, Math.PI*2);
ctx.fill();

function download(size) {
  const c2 = document.createElement('canvas');
  c2.width = size; c2.height = size;
  const ctx2 = c2.getContext('2d');
  ctx2.drawImage(canvas, 0, 0, size, size);
  const a = document.createElement('a');
  a.href = c2.toDataURL('image/png');
  a.download = `icon-${size}.png`;
  a.click();
}
</script>
</body>
</html>
